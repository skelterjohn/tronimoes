steps:
- name: 'gcr.io/cloud-builders/docker'
  dir: 'tronserv'
  args:
  - 'build'
  - '--tag=us-east4-docker.pkg.dev/tronimoes/tronimoes/tronserv:v$SHORT_SHA'
  - '--tag=us-east4-docker.pkg.dev/tronimoes/tronimoes/tronserv:latest'
  - '.'
  waitFor: ['-']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '-a', 'us-east4-docker.pkg.dev/tronimoes/tronimoes/tronserv']
- name: 'gcr.io/cloud-builders/gcloud'
  args: 
  - '-q'
  - 'run'
  - 'deploy'
  - '--image=us-east4-docker.pkg.dev/tronimoes/tronimoes/tronserv:v$SHORT_SHA'
  - '--platform=managed'
  - '--region=us-east4'
  - '--allow-unauthenticated'
  - '--revision-suffix=v$SHORT_SHA'
  - '--port=8080'
  - 'tronserv'
images:
- "us-east4-docker.pkg.dev/tronimoes/tronimoes/tronserv:v$SHORT_SHA"
